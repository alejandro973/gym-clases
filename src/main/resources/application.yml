spring:
  application:
    name: clases
  profiles:
    active: test
server:
  port: 8083


# Habilitación técnica de OpenAPI y Swagger UI para Clases
springdoc:
  api-docs: 
    enabled: true
  swagger-ui: 
    enabled: true
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
